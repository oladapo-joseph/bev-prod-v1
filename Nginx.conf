# ── Nginx reverse proxy for Ritefoods Production App ─────────────────────────
# Access via http://<server-lan-ip>  (no port number needed)
# server_name _ catches any IP or hostname — no domain alias required

worker_processes  1;

events {
    worker_connections 1024;
}

http {

    server_tokens off;

    # Generous timeouts for long-running Streamlit sessions
    proxy_connect_timeout       60s;
    proxy_send_timeout          3600s;
    proxy_read_timeout          3600s;
    send_timeout                3600s;

    upstream streamlit {
        server app:8501;
    }

    server {
        listen 80;

        # Catch-all — responds to any IP or hostname
        # No domain/alias setup required on client devices
        server_name _;

        location / {
            proxy_pass         http://streamlit;
            proxy_http_version 1.1;

            # Streamlit requires WebSocket upgrade
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";

            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

            proxy_buffering    off;
            proxy_cache_bypass $http_upgrade;
        }
    }
}