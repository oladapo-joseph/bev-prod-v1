# ── Ritefoods Limited — Production Management System ─────────────────────────
#
# Access: http://<server-lan-ip>  from any device on the same network
#
# Setup:
#   1. cp .env.example .env  →  fill in SQL Server credentials
#   2. docker compose up -d --build
#
# Tip: assign a static IP to this server in your router's DHCP settings
#      so the address never changes.

version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ritefoods_app
    restart: unless-stopped
    env_file: .env
    expose:
      - "8501"          # internal only — not exposed to LAN directly
    networks:
      - ritefoods_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: ritefoods_nginx
    restart: unless-stopped
    ports:
      - "80:80"         # LAN-facing — http://<server-ip>
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ritefoods_net

networks:
  ritefoods_net:
    driver: bridge